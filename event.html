<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>깜짝 공개</title>

  <style>
    @font-face {
      font-family: "LaundryGothic";
      src: url("LaundryGothic.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      font-family: "LaundryGothic", "Pretendard", "Noto Sans KR", sans-serif;
      background: #fff;
      color: #333;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff9e6;
      text-align: center;
      padding: 28px 20px 40px;
      box-sizing: border-box;
    }

    .title {
      font-size: 28px;
      margin-top: 10px;
      margin-bottom: 12px;
    }

    .sub-text {
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 24px;
      color: #555;
    }

    .photo-box {
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 28px;
    }

    .photo-box img {
      width: 100%;
      display: block;
      border-radius: 12px;
    }

    .back-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 22px;
      background: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">깜짝 공개</h1>
    <p class="sub-text">
      드디어 공개합니다 💛
    </p>

   <div class="photo-box">
  <img src="body1.png" alt="아기와 나 AI 이미지 1">
</div>

<div class="photo-box">
  <img src="body2.png" alt="아기와 나 AI 이미지 2">
</div>

    <a href="index.html" class="back-btn">메인으로 돌아가기</a>
  </div>
</body>
</html>
