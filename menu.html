<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메뉴 안내</title>

<style>
@font-face {
  font-family: "LaundryGothic";
  src: url("LaundryGothic.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}

body {
  margin: 0;
  font-family: "LaundryGothic", "Noto Sans KR", sans-serif;
  background: #f7f3ee;
  text-align: center;
}

.wrap {
  max-width: 480px;
  margin: 0 auto;
  background: #fff;
  padding: 20px;
}

.section {
  margin-bottom: 40px;
}

/* 큰 이미지 */
.main-img {
  width: 100%;
  height: 520px;          /* 크게 보이게 */
  object-fit: contain;    /* 이미지 비율 유지 */
  border-radius: 12px;
  margin-bottom: 16px;
  background: #fff;
}

/* 썸네일 */
.thumb-list {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding-bottom: 10px;
}

.thumb {
  flex: 0 0 auto;
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid #999;   /* 기본 테두리 */
  background: #fff;
}

.thumb.active {
  border: 3px solid #333;   /* 선택된 썸네일 */
}

.back-btn {
  margin-top: 20px;
  display: inline-block;
  padding: 10px 18px;
  background: #333;
  color: #fff;
  text-decoration: none;
  border-radius: 20px;
}
.menu-main-img {
  height: 560px;
  object-fit: contain;
  background: #fff;
}

.food-main-img {
  height: 360px;
  object-fit: cover;
}

.main-img {
  cursor: zoom-in;
}

.image-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.image-modal img {
  max-width: 100%;
  max-height: 90vh;
  object-fit: contain;
}

.image-modal.show {
  display: flex;
}

.close-modal {
  position: fixed;
  top: 18px;
  right: 22px;
  color: white;
  font-size: 34px;
  cursor: pointer;
}

.main-img {
  cursor: zoom-in;
  touch-action: pan-y;
}

img {
  image-rendering: auto;
}
  
</style>
</head>

<body>
<div class="wrap">

  <!-- 🔥 1구역 (메뉴판) -->
  <div class="section">
    <h3>메뉴판</h3>

   <img id="menuMain" src="menu1.jpg" class="main-img menu-main-img"
     ontouchstart="startSwipe(event)"
     ontouchend="endSwipe(event, 'menu')"
     onclick="openModal(this.src)">

    <div class="thumb-list">
     <img src="menu1.jpg" class="thumb active" onclick="setMenu(0)">
<img src="menu2.jpg" class="thumb" onclick="setMenu(1)">
    </div>
  </div>

  <!-- 🔥 2구역 (음식 사진) -->
  <div class="section">
    <h3>음식 사진</h3>

  <img id="foodMain" src="food1.jpg" class="main-img food-main-img"
     ontouchstart="startSwipe(event)"
     ontouchend="endSwipe(event, 'food')"
     onclick="openModal(this.src)">
    
    <div class="thumb-list">
     <img src="food1.jpg" class="thumb active" onclick="setFood(0)">
<img src="food2.jpg" class="thumb" onclick="setFood(1)">
<img src="food3.jpg" class="thumb" onclick="setFood(2)">
<img src="food4.jpg" class="thumb" onclick="setFood(3)">
<img src="food5.jpg" class="thumb" onclick="setFood(4)">
<img src="food6.jpg" class="thumb" onclick="setFood(5)">
<img src="food7.jpg" class="thumb" onclick="setFood(6)">
<img src="food8.jpg" class="thumb" onclick="setFood(7)">
<img src="food9.jpg" class="thumb" onclick="setFood(8)">      
    </div>
  </div>

  <a href="index.html" class="back-btn">돌아가기</a>
</div> 
  
<div id="imageModal" class="image-modal" onclick="closeModal()">
  <span class="close-modal">&times;</span>
  <img id="modalImage" src="">
</div>

<script>
let menuIndex = 0;
let foodIndex = 0;
let startX = 0;
let moved = false;

const menuImages = ["menu1.jpg", "menu2.jpg"];
const foodImages = ["food1.jpg", "food2.jpg", "food3.jpg", "food4.jpg", "food5.jpg", "food6.jpg", "food7.jpg", "food8.jpg" , "food9.jpg"];

function setMenu(index) {
  menuIndex = index;
  document.getElementById("menuMain").src = menuImages[menuIndex];

  document.querySelectorAll(".section:nth-child(1) .thumb").forEach((thumb, i) => {
    thumb.classList.toggle("active", i === menuIndex);
  });
}

function setFood(index) {
  foodIndex = index;
  document.getElementById("foodMain").src = foodImages[foodIndex];

  document.querySelectorAll(".section:nth-child(2) .thumb").forEach((thumb, i) => {
    thumb.classList.toggle("active", i === foodIndex);
  });
}

function startSwipe(event) {
  startX = event.touches[0].clientX;
  moved = false;
}

function endSwipe(event, type) {
  const endX = event.changedTouches[0].clientX;
  const diff = startX - endX;

  if (Math.abs(diff) < 50) return;

  moved = true;

  if (type === "menu") {
    menuIndex = diff > 0
      ? (menuIndex + 1) % menuImages.length
      : (menuIndex - 1 + menuImages.length) % menuImages.length;

    setMenu(menuIndex);
  }

  if (type === "food") {
    foodIndex = diff > 0
      ? (foodIndex + 1) % foodImages.length
      : (foodIndex - 1 + foodImages.length) % foodImages.length;

    setFood(foodIndex);
  }
}

function openModal(src) {
  if (moved) {
    moved = false;
    return;
  }

  document.getElementById("modalImage").src = src;
  document.getElementById("imageModal").classList.add("show");
}

function closeModal() {
  document.getElementById("imageModal").classList.remove("show");
}
</script>
  
</body>
</html>
