<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메뉴 안내</title>

<style>
body {
  margin: 0;
  font-family: "Noto Sans KR", sans-serif;
  background: #f7f3ee;
  text-align: center;
}

.wrap {
  max-width: 480px;
  margin: 0 auto;
  background: #fff;
  padding: 20px;
}

.section {
  margin-bottom: 40px;
}

/* 큰 이미지 */
.main-img {
  width: 100%;
  height: 520px;          /* 크게 보이게 */
  object-fit: contain;    /* 이미지 비율 유지 */
  border-radius: 12px;
  margin-bottom: 16px;
  background: #fff;
}

/* 썸네일 */
.thumb-list {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding-bottom: 10px;
}

.thumb {
  flex: 0 0 auto;
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid #999;   /* 기본 테두리 */
  background: #fff;
}

.thumb.active {
  border: 3px solid #333;   /* 선택된 썸네일 */
}

.back-btn {
  margin-top: 20px;
  display: inline-block;
  padding: 10px 18px;
  background: #333;
  color: #fff;
  text-decoration: none;
  border-radius: 20px;
}
.menu-main-img {
  height: 560px;
  object-fit: contain;
  background: #fff;
}

.food-main-img {
  height: 360px;
  object-fit: cover;
}

.main-img {
  cursor: zoom-in;
}

.image-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.image-modal img {
  max-width: 100%;
  max-height: 90vh;
  object-fit: contain;
}

.image-modal.show {
  display: flex;
}

.close-modal {
  position: fixed;
  top: 18px;
  right: 22px;
  color: white;
  font-size: 34px;
  cursor: pointer;
}
  
</style>
</head>

<body>
<div class="wrap">

  <!-- 🔥 1구역 (메뉴판) -->
  <div class="section">
    <h3>메뉴판</h3>

    <img id="menuMain" src="menu1.jpg" class="main-img menu-main-img">

    <div class="thumb-list">
      <img src="menu1.jpg" class="thumb active" onclick="changeMenu(this)">
      <img src="menu2.jpg" class="thumb" onclick="changeMenu(this)">
      <img src="menu3.jpg" class="thumb" onclick="changeMenu(this)">
      <img src="menu4.jpg" class="thumb" onclick="changeMenu(this)">
      <img src="menu5.jpg" class="thumb" onclick="changeMenu(this)">
      <img src="menu6.jpg" class="thumb" onclick="changeMenu(this)">
    </div>
  </div>

  <!-- 🔥 2구역 (음식 사진) -->
  <div class="section">
    <h3>음식 사진</h3>

    <img id="foodMain" src="food1.jpg" class="main-img food-main-img">

    <div class="thumb-list">
      <img src="food1.jpg" class="thumb active" onclick="changeFood(this)">
      <img src="food2.jpg" class="thumb" onclick="changeFood(this)">
      <img src="food3.jpg" class="thumb" onclick="changeFood(this)">
      <img src="food4.jpg" class="thumb" onclick="changeFood(this)">
      <img src="food5.jpg" class="thumb" onclick="changeFood(this)">
      <img src="food6.jpg" class="thumb" onclick="changeFood(this)">
      <img src="food7.jpg" class="thumb" onclick="changeFood(this)">
      <img src="food8.jpg" class="thumb" onclick="changeFood(this)">
    </div>
  </div>

  <a href="index.html" class="back-btn">돌아가기</a>

</div>

<script>
// 메뉴판
function changeMenu(el) {
  document.getElementById("menuMain").src = el.src;

  document.querySelectorAll(".section:nth-of-type(1) .thumb")
    .forEach(t => t.classList.remove("active"));

  el.classList.add("active");
}

// 음식사진
function changeFood(el) {
  document.getElementById("foodMain").src = el.src;

  document.querySelectorAll(".section:nth-of-type(2) .thumb")
    .forEach(t => t.classList.remove("active"));

  el.classList.add("active");
}
</script>

</body>
</html>
