<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메뉴 안내</title>

  <style>
    body {
      margin: 0;
      font-family: "Noto Sans KR", sans-serif;
      background: #f7f3ee;
      text-align: center;
      color: #333;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      padding: 30px 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .menu-img {
      width: 100%;
      border-radius: 12px;
      margin: 20px 0;
    }

    .menu-desc {
      font-size: 15px;
      line-height: 1.7;
    }

    .back-btn {
      margin-top: 30px;
      display: inline-block;
      padding: 12px 20px;
      background: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 20px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>메뉴 안내</h1>

    <!-- 메뉴 이미지 -->
    <img src="menu.png" class="menu-img">

    <!-- 설명 -->
    <div class="menu-desc">
      신라호텔 라연의 한식 코스 요리입니다.<br><br>
      제철 재료를 활용한 정갈한 한식으로<br>
      상견례에 적합한 품격 있는 식사가 제공됩니다.
    </div>

    <a href="index.html" class="back-btn">돌아가기</a>
  </div>
</body>
</html>
