<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>희연♡호의 상견례에 초대합니다</title>

  <style>
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background: #f7f3ee;
      color: #333;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      text-align: center;
    }

    .hero {
      padding: 70px 24px 50px;
      background: linear-gradient(#f3e7dc, #fff);
    }

    .hero h1 {
      font-size: 28px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .hero p {
      font-size: 16px;
      line-height: 1.8;
    }

    .section {
      padding: 36px 24px;
      border-top: 1px solid #eee;
    }

    .date {
      font-size: 22px;
      font-weight: bold;
      margin: 12px 0;
    }

    /* 약도 이미지 */
    .map-img {
      width: 100%;
      border-radius: 12px;
      margin: 16px 0;
    }

    /* 연락처 */
    .contact-box {
      margin-top: 24px;
    }

    .contact-box h3 {
      margin-bottom: 10px;
      font-size: 18px;
    }

    .icon-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #ddd;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-decoration: none;
    }

    .icon-btn img {
      width: 28px;
      height: 28px;
    }

    footer {
      padding: 30px 20px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="hero">
      <h1>초대합니다</h1>
      <p>
        소중한 분들을 모시고<br />
        뜻깊은 자리를 함께하고자 합니다.
      </p>
    </div>

    <div class="section">
      <h2>행사 안내</h2>
      <div class="date">2026. 06. 07. 일요일</div>
      <p>오후 2시</p>
      <p>서울 신라호텔 라연</p>
    </div>

    <div class="section">
      <h2>오시는 길</h2>

      <img src="약도.png" alt="약도" class="map-img">

      <p>서울 중구 동호로 249 123 신라호텔 라연</p>

      <div class="map-btn-wrap">

  <!-- 네이버 -->
  <a class="map-btn naver" href="https://naver.me/xxxxxxx" target="_blank">
    <img src="naver.png" alt="네이버">
    <span>네이버 지도 열기</span>
  </a>

  <!-- 카카오 -->
  <a class="map-btn kakao" href="https://map.kakao.com/?q=신라호텔 라연" target="_blank">
    <img src="kakao.png" alt="카카오">
    <span>카카오맵 열기</span>
  </a>

</div>
    </div>

    <div class="section">
      <h2>연락처</h2>

      <div class="contact-box">
        <h3>신랑</h3>
        <div class="icon-row">
          <a class="icon-btn" href="tel:01012345678">
            <img src="call.png" alt="전화">
          </a>
          <a class="icon-btn" href="sms:01012345678">
            <img src="message.png" alt="문자">
          </a>
        </div>
      </div>

      <div class="contact-box">
        <h3>신부</h3>
        <div class="icon-row">
          <a class="icon-btn" href="tel:01087654321">
            <img src="call.png" alt="전화">
          </a>
          <a class="icon-btn" href="sms:01087654321">
            <img src="message.png" alt="문자">
          </a>
        </div>
      </div>

    </div>

    <footer>
      불참은 없으며, 참석해 주시는 모든 분들께 감사드립니다.
    </footer>

  </div>
</body>
</html>
