<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모바일 초대장</title>
  <style>
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background: #f7f3ee;
      color: #333;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      text-align: center;
    }

    .hero {
      padding: 70px 24px 50px;
      background: linear-gradient(#f3e7dc, #fff);
    }

    .hero h1 {
      font-size: 28px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .hero p {
      font-size: 16px;
      line-height: 1.8;
    }

    .section {
      padding: 36px 24px;
      border-top: 1px solid #eee;
    }

    .date {
      font-size: 22px;
      font-weight: bold;
      margin: 12px 0;
    }

    .btn {
      display: block;
      margin: 12px auto;
      padding: 14px 18px;
      border-radius: 30px;
      background: #333;
      color: #fff;
      text-decoration: none;
      max-width: 280px;
    }

    .sub-btn {
      background: #8b6f5a;
    }

    footer {
      padding: 30px 20px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>초대합니다</h1>
      <p>
        소중한 분들을 모시고<br />
        뜻깊은 자리를 함께하고자 합니다.
      </p>
    </div>

    <div class="section">
      <h2>행사 안내</h2>
      <div class="date">2026. 05. 30. 토요일</div>
      <p>오후 2시</p>
      <p>서울 ○○웨딩홀 3층</p>
    </div>

    <div class="section">
      <h2>오시는 길</h2>
      <p>서울특별시 ○○구 ○○로 123</p>
      <a class="btn" href="https://map.naver.com" target="_blank">네이버 지도 보기</a>
      <a class="btn sub-btn" href="https://map.kakao.com" target="_blank">카카오맵 보기</a>
    </div>

    <div class="section">
      <h2>연락처</h2>
      <a class="btn" href="tel:01012345678">전화하기</a>
      <a class="btn sub-btn" href="sms:01012345678">문자 보내기</a>
    </div>

    <footer>
      참석해 주시는 모든 분들께 감사드립니다.
    </footer>
  </div>
</body>
</html>
