<script>
  const eventTime = new Date("2026-06-07T14:00:00+09:00");

  function updateCountdown() {
    const now = new Date();
    const diff = eventTime - now;

    const countdown = document.getElementById("countdown");
    const enterBtn = document.getElementById("enterBtn");
    const enterNotice = document.getElementById("enterNotice");

    if (diff <= 0) {
      countdown.innerHTML = "입장 가능합니다.";
      enterBtn.disabled = false;
      enterBtn.innerText = "보러가기";
      enterNotice.innerText = "아래 버튼을 눌러 이동해 주세요.";
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / (60 * 60 * 24));
    const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
    const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
    const seconds = totalSeconds % 60;

    countdown.innerHTML =
      "D-" + days + "<br>" +
      hours + "시간 " + minutes + "분 " + seconds + "초 남았습니다.";
  }

  function goEventPage() {
    window.location.href = "event.html";
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
